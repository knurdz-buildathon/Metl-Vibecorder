# ============================================
# Metl-VibeCoder - Production Docker Compose
# For GCP VM or dedicated server
# Usage:
#   docker compose -f docker-compose.prod.yml up -d --build
# ============================================

name: metl-prod

services:
  # ------------------------------------------
  # PostgreSQL Database
  # ------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: metl-postgres
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${DATABASE_USER:-metlcode}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-metlcode}
      POSTGRES_DB: ${DATABASE_NAME:-metlcode}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-metlcode} -d ${DATABASE_NAME:-metlcode}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - metl

  # ------------------------------------------
  # Redis Cache + Celery Broker
  # ------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: metl-redis
    restart: always
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - metl

  # ------------------------------------------
  # Python Agent Service
  # ------------------------------------------
  agent:
    build:
      context: ./apps/agent
    container_name: metl-agent
    restart: always
    environment:
      - ORCHESTRATOR_URL=http://web:3000
      - GEMINI_PROVIDER=${GEMINI_PROVIDER:-developer}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-3.1-pro-preview-customtools}
      - GEMINI_REVIEW_MODEL=${GEMINI_REVIEW_MODEL:-gemini-3.1-pro-preview}
      - GEMINI_FAST_MODEL=${GEMINI_FAST_MODEL:-gemini-2.5-flash}
      - GEMINI_MAX_OUTPUT_TOKENS=8192
      - VIBECODER_MAX_REPAIR_ATTEMPTS=2
      - CORS_ORIGINS=http://localhost:3000,http://localhost:80,https://localhost
      - WORKSPACE_BASE_DIR=/workspace-volumes
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./workspace-volumes:/workspace-volumes
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - metl

  # ------------------------------------------
  # Next.js Web Application
  # ------------------------------------------
  web:
    build:
      context: ./apps/web
    container_name: metl-web
    restart: always
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://${DATABASE_USER:-metlcode}:${DATABASE_PASSWORD:-metlcode}@postgres:5432/${DATABASE_NAME:-metlcode}?schema=public
      - REDIS_URL=redis://redis:6379
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3000}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - AGENT_SERVICE_URL=http://agent:8000
      - GEMINI_PROVIDER=${GEMINI_PROVIDER:-developer}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-3.1-pro-preview-customtools}
      - GITHUB_ID=${GITHUB_ID}
      - GITHUB_SECRET=${GITHUB_SECRET}
      - WORKSPACE_PROVIDER=${WORKSPACE_PROVIDER:-local-docker}
      - WORKSPACE_BASE_DIR=/workspace-volumes
      - CODE_SERVER_PASSWORD=${CODE_SERVER_PASSWORD:-metlcode}
      - SKIP_ENV_VALIDATION=true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./workspace-volumes:/workspace-volumes
    ports:
      - "3000:3000"
    depends_on:
      agent:
        condition: service_started
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - metl

  # ------------------------------------------
  # Nginx Reverse Proxy
  # ------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: metl-nginx
    restart: always
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - web
    networks:
      - metl

volumes:
  postgres_data:
  redis_data:

networks:
  metl:
    driver: bridge
